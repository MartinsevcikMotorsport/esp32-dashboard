name: Update F1 Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Generate F1 JSON
        run: |
          python3 << 'EOF'
          import requests
          import json

          # --- 1) Získání aktuální session ---
          session_info = requests.get(
              "https://api.openf1.org/v1/sessions?session_key=latest"
          ).json()

          current_session = session_info[0]["session_name"]
          current_gp_key = session_info[0]["session_key"]

          # --- 2) Pořadí jezdců (TOP 5) ---
          positions = requests.get(
              f"https://api.openf1.org/v1/position?session_key={current_gp_key}"
          ).json()

          top5 = sorted(positions, key=lambda x: x["position"])[:5]

          # --- 3) Metadata jezdců ---
          drivers_meta = requests.get(
              f"https://api.openf1.org/v1/drivers?session_key={current_gp_key}"
          ).json()

          # Převod na dict podle driver_number
          meta_by_number = {d["driver_number"]: d for d in drivers_meta}

          # --- 4) Funkce pro získání nejlepšího času ---
          def best_time(session_name, driver_number):
              laps = requests.get(
                  f"https://api.openf1.org/v1/laps?session_key={session_name}&driver_number={driver_number}"
              ).json()

              if not laps:
                  return "N/A"

              # Najdeme nejrychlejší kolo
              best = min(
                  (lap for lap in laps if lap.get("lap_time")),
                  key=lambda x: x["lap_time"],
                  default=None
              )

              if best is None:
                  return "N/A"

              return best["lap_time"]

          # --- 5) Sestavení výsledného JSONu ---
          results = []

          for entry in top5:
              num = entry["driver_number"]
              meta = meta_by_number.get(num, {})

              results.append({
                  "name": meta.get("driver_name", "Unknown"),
                  "team": meta.get("team_name", "Unknown"),
                  "position": entry["position"],
                  "fp1": best_time("FP1", num),
                  "fp2": best_time("FP2", num),
                  "qualifying": best_time("Q", num)
              })

          data = {
              "current_session": current_session,
              "drivers": results
          }

          with open("f1.json", "w") as f:
              json.dump(data, f, indent=2)

          EOF

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add f1.json
          git commit -m "Auto-update F1 data" || echo "No changes"
          git push
