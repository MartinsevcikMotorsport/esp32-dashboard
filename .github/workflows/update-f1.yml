name: Update F1 Data

on:
  schedule:
    - cron: "*/5 * * * *"   # každých 5 minut
  workflow_dispatch:        # možnost spustit ručně

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install FastF1
        run: pip install fastf1

      - name: Create cache folder
        run: mkdir cache

      - name: Generate F1 JSON
        run: |
          python3 << 'EOF'
          import fastf1
          import json

          fastf1.Cache.enable_cache('cache')

          # Vybereme session (2024 Bahrain Qualifying)
          session = fastf1.get_session(2024, 'Bahrain', 'Q')
          session.load()

          results = []

          # vezmeme prvních 5 jezdců podle pořadí
          for drv_id in session.drivers[:5]:
              drv = session.get_driver(drv_id)
              laps = session.laps.pick_driver(drv_id)
              best = laps.pick_fastest()

              results.append({
                  "name": drv['full_name'],
                  "team": drv['team_name'],
                  "time": str(best['LapTime']) if best is not None else "N/A"
              })

          data = {
              "session": "Qualifying",
              "results": results
          }

          with open("f1.json", "w") as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add f1.json
          git commit -m "Auto-update F1 data" || echo "No changes"
          git push
